<!-- Dynamic Header с оптимизированными изображениями -->
<header class="dynamic-header header-ru" id="mainHeader">
    <!-- Russia Background Images -->
    <picture class="header-bg header-bg-ru">
        <source 
            srcset="
                images/ru/header-640.webp 640w,
                images/ru/header-1024.webp 1024w,
                images/ru/header-1920.webp 1920w
            "
            sizes="100vw"
            type="image/webp"
        >
        <img 
            src="images/ru/header-1920.webp"
            alt="Russia Background"
            loading="eager"
            fetchpriority="high"
        >
    </picture>
    
    <!-- China Background Images -->
    <picture class="header-bg header-bg-cn" style="display: none;">
        <source 
            srcset="
                images/cn/header-640.webp 640w,
                images/cn/header-1024.webp 1024w,
                images/cn/header-1920.webp 1920w
            "
            sizes="100vw"
            type="image/webp"
        >
        <img 
            src="images/cn/header-1920.webp"
            alt="China Background"
            loading="eager"
            fetchpriority="high"
        >
    </picture>
    
    <!-- Global Background Images -->
    <picture class="header-bg header-bg-global" style="display: none;">
        <source 
            srcset="
                images/global/header-640.webp 640w,
                images/global/header-1024.webp 1024w,
                images/global/header-1920.webp 1920w
            "
            sizes="100vw"
            type="image/webp"
        >
        <img 
            src="images/global/header-1920.webp"
            alt="Global Background"
            loading="eager"
            fetchpriority="high"
        >
    </picture>

    <div class="container header-content">
        <!-- Ваш существующий контент -->
        <div class="row align-items-center">
            <div class="col-lg-6">
                <span class="opensource-badge mb-3">
                    <i class="bi bi-github"></i>
                    <span data-translate="opensource">Open Source Project</span>
                </span>
                <h1 class="display-3 fw-bold mb-4" data-translate="title">
                    Starter Sphere
                </h1>
                <p class="lead mb-4" data-translate="subtitle">
                    Your Personal AI Assistant Platform
                </p>
                <div class="d-flex gap-3 flex-wrap">
                    <a href="https://github.com/startersphere" class="btn btn-light btn-lg px-4" target="_blank" rel="noopener">
                        <i class="bi bi-github me-2"></i>
                        <span data-translate="github">GitHub</span>
                    </a>
                    <a href="#dialog" class="btn btn-primary btn-lg px-4">
                        <i class="bi bi-chat-dots me-2"></i>
                        <span data-translate="try_demo">Попробовать</span>
                    </a>
                </div>
            </div>
            <div class="col-lg-6 text-center">
                <div class="header-sphere-preview">
                    <div class="mini-sphere ru" id="headerSphere">
                        <div class="mini-sphere-screen">
                            <span class="sphere-emoji">🐻️</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
