<div class="row">
    <!-- Боковое меню -->
    <div class="col-md-3 col-lg-2 d-md-block sidebar">
        <div class="position-sticky pt-3">
            <ul class="nav flex-column" id="mainMenu">
                {% for section in sections_in_control_panel %}
                <li class="nav-item">
                    <a class="nav-link {% if loop.first %}active bg-primary text-white{% endif %}" href="#" data-section="{{ section.section_slug }}">
                        <i class="bi {{ section.section_icon }} me-2"></i> {{ section.section_name }}
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
    
    <!-- Область контента -->
    <div class="col-md-9 col-lg-10 ms-sm-auto content-area">
        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">{{ t('controlPanel_loading') }}</span>
            </div>
        </div>
        
        <div id="contentArea">
            <!-- Здесь будут модули -->
            {% for section in sections_in_control_panel %}
            <div id="{{ section.section_slug }}Section" class="section-content {% if loop.first %}active{% else %}d-none{% endif %}" data-loaded="{% if loop.first %}true{% else %}false{% endif %}">
                {% if loop.first %}
                    <!-- Первый модуль загружается сразу -->
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    // Загружаем переводы для JavaScript
    const translations = {
        loading: "{{ t('controlPanel_loading') }}",
        action_error: "{{ t('controlPanel_action_error') }}",
        section_error: "{{ t('controlPanel_section_error') }}",
        parse_error: "{{ t('controlPanel_parse_error') }}"
    };

    // Initialize menu
    initMenu();
    
    // Load first section on initial load
    const firstSectionLink = $('#mainMenu a.nav-link.active').first();
    if (firstSectionLink.length) {
        loadSection(firstSectionLink.data('section'), true);
    }

    // Универсальный обработчик действий внутри модулей
    $(document).on('click', '.section-content [data-action]', function(e) {
        e.preventDefault();
        
        const $this = $(this);
        const action = $this.data('action');
        const section = $this.closest('.section-content').attr('id').replace('Section', '');
        const acceptType = $this.data('accept') || 'html';
        
        // Получаем дополнительные данные
        let additionalData = {};
        try {
            const dataAttr = $this.data('data');
            if (dataAttr) {
                additionalData = typeof dataAttr === 'string' ? JSON.parse(dataAttr) : dataAttr;
            }
        } catch (e) {
            console.error(translations.parse_error, e);
        }
        
        // Показываем спиннер
        const $spinner = $('#loadingSpinner').show();
        const $target = $this.closest('.section-content').find('#dockerContent');
        
        // Формируем запрос
        const requestData = {
            section: section,
            action: action,
            ...additionalData
        };
        
        // Настройки AJAX
        const ajaxOptions = {
            url: '/',
            method: 'POST',
            data: requestData,
            headers: {
                'Accept': acceptType === 'json' ? 'application/json' : 'text/html'
            },
            success: function(response) {
                if (acceptType === 'html' && (typeof response === 'string' || response instanceof String)) {
                    $target.html(response);
                } 
                else if (acceptType === 'json' && typeof response === 'object') {
                    if (response.redirect) {
                        window.location.href = response.redirect;
                    } else if (response.html) {
                        $target.html(response.html);
                    } else if (response.message) {
                        console.log(response.message);
                    }
                }
                
                $this.closest('ul').find('a.nav-link').removeClass('active bg-primary text-white');
                $this.addClass('active bg-primary text-white');
            },
            error: function(xhr, status, error) {
                $target.html(`
                    <div class="alert alert-danger">
                        <h5>${translations.action_error}</h5>
                        <p>${translations.control_panel_status}: ${status}</p>
                        <p>${translations.control_panel_error}: ${error}</p>
                        ${xhr.responseText ? `<pre>${xhr.responseText}</pre>` : ''}
                    </div>
                `);
            },
            complete: function() {
                $spinner.hide();
            }
        };
        
        ajaxOptions.dataType = acceptType === 'json' ? 'json' : 'html';
        $.ajax(ajaxOptions);
    });    
});

function initMenu() {
    $('#mainMenu a.nav-link').on('click', function(e) {
        e.preventDefault();
        
        const $this = $(this);
        const section = $this.data('section');
        
        if ($this.hasClass('active')) return;
        
        $('#mainMenu a.nav-link').removeClass('active bg-primary text-white');
        $this.addClass('active bg-primary text-white');
        switchSection(section);
    });
}

function switchSection(section) {
    $('.section-content').removeClass('active').addClass('d-none');
    const $sectionElement = $(`#${section}Section`);
    $sectionElement.removeClass('d-none').addClass('active');
    
    if ($sectionElement.data('loaded') !== true) {
        loadSection(section, false);
    }
}

function loadSection(section, isInitialLoad) {
    const $sectionElement = $(`#${section}Section`);
    const $spinner = $('#loadingSpinner');
    
    $spinner.css({
        'display': 'flex',
        'justify-content': 'center',
        'align-items': 'center',
        'height': '200px'
    }).show();
    
    $sectionElement.html('').addClass('loading');
    
    $.ajax({
        url: '/',
        method: 'POST',
        data: {
            section: section,
            action: 'index'
        },
        dataType: 'html',
        success: function(response, status, xhr) {
            $sectionElement.html(response);
            $sectionElement.data('loaded', true);
            $spinner.hide();
        },
        error: function(xhr, status, error) {
            $sectionElement.html(`
                <div class="alert alert-danger">
                    <h5>${translations.section_error}</h5>
                    <p>${translations.control_panel_status}: ${status}</p>
                    <p>${translations.control_panel_error}: ${error}</p>
                </div>
            `);
            $sectionElement.data('loaded', true);
            $spinner.hide();
        }
    });
}
</script>
