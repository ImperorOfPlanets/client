networks:
  mentoriaservernet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1

volumes:
  shared-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: C:\control\mentoria\docker\logs
  shared-code:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /app/laravel

services:

  ### VPNCLIENT ###
  vpn-mentoria:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile_other
    container_name: vpn-mentoria
    environment:
      - PROJECTNAME=mentoria
      - VPN_REQUIRED=optional
      #- TUN_DEVICE=${TUN_DEVICE}
      #- VPN_READY_FILE=${VPN_READY_FILE}
      #- VPN_ERROR_FILE=${VPN_ERROR_FILE}
      - VPN_USERNAME=
      - VPN_PASSWORD=
      - NGINX_DOMAIN=192.168.0.185
      - ENABLED_SERVICES=VPNCLIENT,PHP,NGINX,WORKER,REVERB,REDIS,QDRANT,TEI
    restart: unless-stopped
    user: root
    cap_add:
      - NET_ADMIN
      - MKNOD
    devices:
      - /dev/net/tun:/dev/net/tun 
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.route_localnet=1
    security_opt:
      - "no-new-privileges:false"
    volumes:
      - shared-logs:/var/log/vpn:rw
    command: start-vpn.sh
    networks:
      mentoriaservernet:
        ipv4_address: 172.21.11.11
    healthcheck:
      test: ["CMD", "sh", "/var/scripts/healthcheck-vpn.sh"]
      interval: 60s
      timeout: 20s
      retries: 2
      start_period: 20s

  ### WORKER ###
  worker-mentoria:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile_php
    container_name: worker-mentoria
    working_dir: /var/www/html
    restart: unless-stopped
    environment:
      - PROJECTNAME=mentoria
    volumes:
      - shared-code:/var/www/html:rw,z,cached
      - shared-logs:/var/log/php:rw
      - shared-logs:/var/log/vpn:rw
      - shared-logs:/var/log/worker:rw
      - shared-logs:/var/log/supervisor:rw
    networks:
      mentoriaservernet:
        ipv4_address: 172.21.0.10
    command: start-supervisor.sh
    healthcheck:
      test: ["CMD-SHELL", "supervisorctl status > /var/log/worker/healthcheck.log 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    user: root

  ### NGINX ###
  nginx-mentoria:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile_nginx
    container_name: nginx-mentoria
    cap_add:
      - NET_ADMIN
    ports:
    - "80:80"    # внешний порт 80 -> внутренний 80
    - "443:443"  # внешний порт 443 -> внутренний 443
    environment:
      - PROJECTNAME=mentoria
      - NGINX_DOMAIN=192.168.0.185
      - MAX_BODY_SIZE=100M
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - shared-code:/var/www/html:rw,z,cached
      - shared-logs:/var/log/nginx:rw
    networks:
      mentoriaservernet:
        ipv4_address: 172.21.0.12
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "- k -f", "http://localhost/"]  # Попытка получить страницу с кодом <400
      interval: 30s                                   # Интервал повторения проверки
      timeout: 10s                                    # Максимальное время ожидания ответа
      retries: 3                                     # Количество неудачных проверок для отметки unhealthy
      start_period: 10s                              # Время на старт контейнера до начала проверок

  ### PHP ###
  php-mentoria:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile_client
      args:
        - CODE_DIR_ABSOLUTE=${CODE_DIR_ABSOLUTE}
        - PROJECT_ROOT=${PROJECT_ROOT}
    container_name: php-mentoria
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    volumes:
      # Остальные volume
      - shared-code:/var/www/html:rw,z,cached
      - ${DIR_COPY:-/dev/null}:/var/www/html.copy:rw,z
      - shared-logs:/var/log/php:rw
      - shared-logs:/var/log/vpn:rw
    command: ["/usr/local/bin/client-init.sh"]
    working_dir: /var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=
      - APP_LOCALE=ru
      - CACHE_STORE=database
      - PROCESS_TIMEOUT=300
      - PHP_FPM_LISTEN=127.0.0.1:9000

      # Коннект к БД
      - DB_CONNECTION=mariadb
      - DB_HOST=192.168.0.185
      - DB_PORT=3306
      - DB_DATABASE=temp
      - DB_USERNAME=root
      - DB_PASSWORD=root

      # Qdrant векторная БД
      - QDRANT_HOST=http://qdrant:6333
      - QDRANT_COLLECTION=embeddings
      - QDRANT_TIMEOUT=30

      # Для создания резервных файлов
      #- DIR_COPY=${DIR_COPY}

      # Режим запуска
      #- INIT_MODE=${INIT_MODE}

      # Передается для расчета размера максимально файла на отправку
      - MAX_BODY_SIZE=100M

      - PHP_UPLOAD_MAX_FILESIZE=50M
      - PHP_POST_MAX_SIZE=50M
      - PHP_FPM_PM=dynamic
      - PHP_FPM_MAX_CHILDREN=50
      - PHP_FPM_MEMORY_LIMIT=256M

      - QUEUE_CONNECTION=database
      
      # Список дополнительно запускаемых сервисов
      - ENABLED_SERVICES=VPNCLIENT,PHP,NGINX,WORKER,REVERB,REDIS,QDRANT,TEI

      # Внешняя авторизация
      - OAUTH_CLIENT_ID=
      - OAUTH_SECRET=

      # REVERB
      - REVERB_APP_ID=
      - REVERB_APP_KEY=
      - REVERB_APP_SECRET=
      - REVERB_HOST=
      - REVERB_PORT=443
      - REVERB_SCHEME=https
      - REVERB_APP_MAX_MESSAGE_SIZE=1048576
    networks:
      mentoriaservernet:
        ipv4_address: 172.21.0.13
        aliases:
          - mentoria-php
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  ### REVERB (отдельный минимальный образ) ###
  reverb-mentoria:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile_reverb
    container_name: reverb-mentoria
    restart: unless-stopped
    environment:
      # Обязательные
      - APP_KEY=${APP_KEY}  # Берем из основного приложения
      - REVERB_APP_ID=
      - REVERB_APP_KEY=
      - REVERB_APP_SECRET=
      - REVERB_HOST=0.0.0.0  # Слушаем все интерфейсы
      - REVERB_PORT=8443
      
      # Опциональные
      - REVERB_SCHEME=${REVERB_SCHEME:-https}
      - REVERB_DEBUG=${REVERB_DEBUG:-true}
    ports:
      - "8443:8443"  # Пробрасываем порт наружу
    networks:
      mentoriaservernet:
        ipv4_address: 172.21.0.16
    healthcheck:
      test: ["CMD", "php", "artisan", "reverb:ping", "--host=localhost", "--port=8443"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # НИКАКИХ VOLUMES! Образ самодостаточный

  ### QDRANT ###
  qdrant-mentoria:
    image: qdrant/qdrant:v1.8.1  # Актуальная версия
    container_name: qdrant-mentoria
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333  # Порт HTTP API
      - QDRANT__SERVICE__GRPC_PORT=6334  # Порт gRPC (если нужно)
    volumes:
      - ./db/qdrant:/qdrant/storage  # Путь для хранения данных
      - shared-logs:/var/log/qdrant:rw
    networks:
      mentoriaservernet:
        ipv4_address: 172.21.0.17
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3

  ### REDIS ###
  redis-mentoria:
    image: redis:6.2-alpine
    container_name: redis-mentoria
    restart: unless-stopped
    volumes:
      - ./db/redis:/data
      - shared-logs:/var/log/redis:rw
    command:
      - redis-server
      - --save 20 1
      - --loglevel warning
      - --logfile /var/log/redis/redis.log
      - --syslog-enabled no
    networks:
      mentoriaservernet:
        ipv4_address: 172.21.0.15
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  ### MARIADB ###
  mariadb-mentoria:
    image: mariadb:10.8
    container_name: mariadb-mentoria
    working_dir: /var/lib/mysql
    environment:
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'no'
      MARIADB_DATABASE: temp
      MARIADB_USER: root
      MARIADB_PASSWORD: root
    volumes:
      - ./data/mysql:/var/lib/mysql
      - shared-logs:/var/log/mariadb:rw
      - ./configs/mariadb/conf.d:/etc/mysql/conf.d:ro
    networks:
      mentoriaservernet:
        ipv4_address: 172.21.0.14
    restart: unless-stopped