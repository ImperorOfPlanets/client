;;;;;;;;;;;;;;;;;;;;;
; FPM Configuration ;
;;;;;;;;;;;;;;;;;;;;;

[global]
; Логирование
; DEV: Подробные логи для отладки
; PROD: Только критические ошибки
error_log = /var/log/php/error.log
log_level = notice  ; DEV: "debug" | PROD: "notice" или "warning"

; Аварийный перезапуск
; PROD: Автоматически перезапускаться при сбоях
emergency_restart_threshold = 10    ; Кол-во сбоев для перезапуска
emergency_restart_interval = 1m     ; Временное окно для сбоев

;;;;;;;;;;;;;;;;;;;;
; Настройки пула  ;
;;;;;;;;;;;;;;;;;;;;

[www]
; Пользователь/группа
user = www-data
group = www-data

; Права на сокет
listen.owner = www-data
listen.group = www-data
listen.mode = 0660  ; DEV: 0666 (все могут писать) | PROD: 0660 (только user/group)

;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Режим управления процессами ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; DEV: "dynamic" (баланс между производительностью и отладкой)
; PROD: "ondemand" (экономия памяти) или "dynamic" (высокая нагрузка)
pm = dynamic

; Максимальное число процессов
pm.max_children = 50    ; DEV: 20-50 | PROD: Рассчитывать по формуле: (Available RAM - 1GB) / (Memory per PHP process)

; Число процессов при старте
pm.start_servers = 5    ; DEV: 2-5 | PROD: ~25% от pm.max_children

; Минимальное число свободных процессов
pm.min_spare_servers = 3  ; DEV: 1-3 | PROD: ~20% от pm.max_children

; Максимальное число свободных процессов
pm.max_spare_servers = 10 ; DEV: 5-10 | PROD: ~35% от pm.max_children

; Лимит запросов на процесс (защита от утечек памяти)
pm.max_requests = 500   ; DEV: 0 (отключено) | PROD: 500-2000

; PROD: Таймаут для неактивных процессов (только для pm=ondemand)
;pm.process_idle_timeout = 10s

; Статус FPM (мониторинг)
pm.status_path = /status

;;;;;;;;;;;;;;;;;;;;
; Логирование      ;
;;;;;;;;;;;;;;;;;;;;

; Медленные запросы (раскомментировать при проблемах)
slowlog = /var/log/php/slow.log
;request_slowlog_timeout = 5s  ; DEV: 1s | PROD: 5s-10s

; Лог доступа (раскомментировать при необходимости)
access.log = /var/log/php/access.log