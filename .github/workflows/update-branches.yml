name: Auto-update protected branches

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update all protected branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch --all
          git checkout master
          git pull origin master
          
          # Используем одну ветку для каждой целевой ветки
          for target in china russia; do
            echo ""
            echo "🔄 Обрабатываю: $target"
            
            PR_BRANCH="update-$target"
            
            # Создаем или обновляем ветку
            git checkout -B "$PR_BRANCH" "origin/$target"
            
            if git rebase master; then
              git push origin "$PR_BRANCH" --force-with-lease
              
              # Проверяем существующий PR
              PR_NUMBER=$(gh pr list \
                --base "$target" \
                --head "$PR_BRANCH" \
                --state open \
                --json number \
                --jq '.[].number')
              
              if [ -z "$PR_NUMBER" ]; then
                # Создаем новый PR
                gh pr create \
                  --base "$target" \
                  --head "$PR_BRANCH" \
                  --title "🔄 Обновление $target из master" \
                  --body "Автоматическое обновление защищенной ветки \`$target\` последними изменениями из \`master\`.\n\nТребуется 3 approvals для слияния." \
                  --label "auto-update,$target"
                echo "  ✅ Новый PR создан для $target"
              else
                echo "  ✅ PR #$PR_NUMBER уже существует и обновлен"
              fi
            else
              echo "  ❌ Конфликт в $target"
              git rebase --abort
            fi
            
            git checkout master
          done