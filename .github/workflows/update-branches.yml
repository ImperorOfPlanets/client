name: Update all GitHub branches when master changes

on:
  push:
    branches: [master]

# Явно указываем permissions на уровне workflow
permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  update-all-branches:
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Get all branches from GitHub
        run: |
          echo "📋 Получаю список всех веток на GitHub..."
          
          # Получаем все ветки
          git fetch --all
          
          # Список всех веток (исключая master и текущую)
          git branch -r | grep "origin/" | grep -v "HEAD" | grep -v "master" | sed 's/origin\///' > all-branches.txt
          
          echo "Найденные ветки:"
          cat all-branches.txt
          
          if [ ! -s all-branches.txt ]; then
            echo "Нет других веток для обновления"
            exit 0
          fi
          
      - name: Show current permissions
        run: |
          echo "Проверяем permissions..."
          git remote -v
          echo "Текущий пользователь: $(git config user.name)"
          
      - name: Update each branch with latest master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Настраиваем remote с токеном
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          
          # Обновляем master
          git checkout master
          git pull origin master
          
          # Проходим по каждой ветке
          while read branch; do
            if [ -n "$branch" ]; then
              echo ""
              echo "🔄 ========================================"
              echo "🔄 Обрабатываю ветку: $branch"
              echo "🔄 ========================================"
              
              # Проверяем, существует ли ветка
              if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
                echo "   ✅ Ветка $branch найдена"
                
                # Создаем или переключаемся на ветку
                git checkout -B "$branch" "origin/$branch"
                
                # Пробуем сделать rebase
                if git rebase master; then
                  echo "   ✅ Rebase успешен! Отправляю изменения..."
                  git push origin "$branch" --force-with-lease
                  echo "   ✅ Ветка $branch успешно обновлена!"
                else
                  echo "   ❌ КОНФЛИКТ в ветке $branch!"
                  git rebase --abort
                fi
              else
                echo "   ❌ Ветка $branch не найдена"
              fi
              
              # Возвращаемся на master
              git checkout master
            fi
          done < all-branches.txt
          
      - name: Create summary
        if: always()
        run: |
          echo "## Результаты синхронизации" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Workflow завершен: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Обработанные ветки:" >> $GITHUB_STEP_SUMMARY
          cat all-branches.txt 2>/dev/null | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY || echo "- Нет веток" >> $GITHUB_STEP_SUMMARY